"$schema" = 'https://starship.rs/config-schema.json'

format = """
$username\
$directory\
$git_branch\
$git_status\
$status\
$cmd_duration\
$character"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

[username]
disabled = false
format = "[$user]($style):"
show_always = true
style_user = "bold mauve"
style_root = "bold red"

[directory]
format = "[$path]($style) "
style = "bold blue"
truncation_length = 1
truncate_to_repo = false

[git_branch]
format = "[$symbol$branch]($style):"
style = "bold teal"
symbol = ""

[git_status]
disabled = false
style = "red"
format = '[$all_status$ahead_behind]($style) '
up_to_date = '[✓](green)'
untracked = '[?$count](yellow)'
modified = '[!$count](yellow)'
staged = '[+$count](green)'
ahead = '[⇡$count](teal)'
behind = '[⇣$count](red)'
diverged = '[⇡$ahead_count⇣$behind_count](mauve)'
deleted = '[✘$count](red)'
renamed = '[»$count](mauve)'
stashed = '[$$count](mauve)'

[status]
disabled = false
format = '[✘$status]($style) '
style = "red"

[cmd_duration]
min_time = 2000
format = "[$duration]($style) "
style = "subtext0"

[character]
success_symbol = "[\\$](green)"
error_symbol = "[\\$](red)"
